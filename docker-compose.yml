services:
  mysql:
    image: mysql:8.4
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: Senha123
      MYSQL_DATABASE: meubanco
    volumes:
      - mysql_data:/var/lib/mysql
      - ./banco.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  app1:
    build:
      context: .
      dockerfile: dockerfile.app
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Senha123
      DB_NAME: meubanco
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - appnet

  app2:
    build:
      context: .
      dockerfile: dockerfile.app
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Senha123
      DB_NAME: meubanco
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - appnet

  app3:
    build:
      context: .
      dockerfile: dockerfile.app
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Senha123
      DB_NAME: meubanco
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - appnet

  loadbalancer:
    build:
      context: .
      dockerfile: dockerfile
    container_name: nginx-lb
    depends_on:
      - app1
      - app2
      - app3
    ports:
      - "4500:80"
    networks:
      - appnet

volumes:
  mysql_data:

networks:
  appnet:
    driver: bridge
